<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mamulux | სკამების კატალოგი</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <img id="companyLogo" src="" alt="Mamulux">
    <div>
      <h1>სკამების კატალოგი</h1>
      <p>Mamulux Premium Collection</p>
    </div>
  </div>

  <div class="top-actions">
    <a id="callBtn" class="liquid-btn dark" href="#">დარეკვა</a>
    <a id="whatsappBtn" class="liquid-btn green" href="#" target="_blank">WhatsApp</a>
  </div>
</header>

<section class="filters">
  <input id="searchInput" type="text" placeholder="ძიება კოდით, სახელით ან კატეგორიით..." />
  <select id="categoryFilter">
    <option value="">ყველა კატეგორია</option>
  </select>
</section>

<main class="catalog">
  <div id="productsGrid" class="products-grid"></div>
</main>

<footer class="footer">
  <div>
    <strong>Mamulux</strong>
    <p id="footerAddress"></p>
  </div>
  <div>
    <a id="facebookLink" href="#" target="_blank">Facebook</a>
    <a id="instagramLink" href="#" target="_blank">Instagram</a>
    <a id="mapsLink" href="#" target="_blank">Maps</a>
  </div>
</footer>

<script src="./config.js"></script>
<script src="./script.js"></script>
</body>
</html>
